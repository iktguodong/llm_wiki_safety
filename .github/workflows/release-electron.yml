name: Release Electron Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend release tools
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build backend binary
        run: |
          mkdir -p backend-release
          python -m PyInstaller \
            --noconfirm \
            --onefile \
            --name anniu-backend \
            --distpath backend-release \
            --workpath build/pyinstaller \
            --specpath build/pyinstaller \
            backend/app.py

      - name: Build Electron app
        working-directory: frontend
        run: npm run electron:build

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            frontend/release/*.dmg
            frontend/release/*.zip
            frontend/release/*.blockmap
            frontend/release/latest-mac.yml
          generate_release_notes: true
